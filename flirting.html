<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimum French, Maximum Flirting</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; padding: 20px 24px 14px; text-align: center; border-bottom: 1px solid #222; }
        .title { font-size: 14px; font-weight: 400; letter-spacing: 2px; text-transform: uppercase; color: #fff; }
        .container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px 24px; width: 100%; }
        .card-wrapper { width: 100%; max-width: 380px; perspective: 1200px; }
        .card { width: 100%; height: 480px; position: relative; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border: 1px solid #333; display: flex; flex-direction: column; justify-content: space-between; padding: 28px 28px; background: #000; }
        .card-back { transform: rotateY(180deg); }
        .card-content { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding-bottom: 16px; }
        .french-text { font-size: 24px; font-weight: 400; line-height: 1.3; letter-spacing: 0.02em; margin-bottom: 24px; color: #fff; }
        .audio-btn { background: transparent; color: #fff; border: 0.5px solid #fff; padding: 8px 24px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: inherit; font-weight: 400; -webkit-appearance: none; appearance: none; transition: background 0.2s, color 0.2s; }
        .audio-btn:hover { background: #fff; color: #000; }
        .english-text { font-size: 24px; font-weight: 400; color: #fff; margin-bottom: 20px; line-height: 1.2; letter-spacing: 0.02em; }
        .meaning-text { font-size: 13px; font-weight: 400; letter-spacing: 2px; text-transform: uppercase; color: #aaa; line-height: 1.6; max-width: 300px; }
        .tap-hint { text-align: center; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #aaa; font-weight: 400; }
        .navigation { width: 100%; max-width: 380px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px 24px; }
        .nav-btn { background: transparent; border: 1px solid #555; padding: 9px 18px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: inherit; font-weight: 400; color: #999; -webkit-appearance: none; appearance: none; transition: background 0.2s, color 0.2s, border-color 0.2s; }
        .nav-btn:hover { background: #fff; color: #000; border-color: #fff; }
        .nav-btn:disabled { opacity: 1; cursor: default; color: #444; border-color: #333; }
        .nav-btn:disabled:hover { background: transparent; color: #444; border-color: #333; }
        .progress { font-size: 12px; letter-spacing: 1px; font-weight: 400; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">Minimum French, Maximum Flirting</div>
    </div>
    <div class="container">
        <div class="card-wrapper">
            <div class="card" id="flashcard">
                <div class="card-face card-front">
                    <div class="card-content">
                        <div class="french-text" id="french-text"></div>
                        <button class="audio-btn" id="audio-btn">Listen</button>
                    </div>
                    <div class="tap-hint">tap to flip</div>
                </div>
                <div class="card-face card-back">
                    <div class="card-content">
                        <div class="english-text" id="english-text"></div>
                        <div class="meaning-text" id="meaning-text"></div>
                    </div>
                    <div class="tap-hint">tap to flip back</div>
                </div>
            </div>
        </div>
    </div>
    <div class="navigation">
        <button class="nav-btn" id="prev-btn">&#8592; Prev</button>
        <div class="progress"><span id="current">1</span> / <span id="total">30</span></div>
        <button class="nav-btn" id="next-btn">Next &#8594;</button>
    </div>
    <script>
        const cards = [
            { french: "Enchanté", english: "Nice to meet you", meaning: "Simple. Smooth. French" },
            { french: "Je peux ?", english: "May I?", meaning: "Minimal. Confident. Paris" },
            { french: "Tu m'intrigues", english: "You intrigue me", meaning: "Modern. Magnetic" },
            { french: "T'es du quartier ?", english: "You from around here?", meaning: "Local test" },
            { french: "Tu viens souvent ici ?", english: "You come here often?", meaning: "Classic opener" },
            { french: "Tu attends quelqu'un ?", english: "Are you waiting for someone?", meaning: "Elegant check" },
            { french: "T'as un truc en plus", english: "You've got something extra", meaning: "Intrigue compliment" },
            { french: "Pas mal", english: "Not bad", meaning: "Understated attraction" },
            { french: "T'es mon style", english: "You're my type", meaning: "Direct hit" },
            { french: "J'aime ton vibe", english: "I like your vibe", meaning: "Modern. Light. Flirty" },
            { french: "T'es canon", english: "You're hot", meaning: "Straight fire" },
            { french: "T'es beau / belle", english: "You're beautiful", meaning: "Classic" },
            { french: "Tu as du charme", english: "You have charm", meaning: "Soft and elegant" },
            { french: "Dis-moi tout", english: "Tell me everything", meaning: "Curiosity pull" },
            { french: "Tu viens d'où ?", english: "Where are you from?", meaning: "Fast chemistry check" },
            { french: "Tu fais quoi dans la vie ?", english: "What do you do?", meaning: "Paris always asks" },
            { french: "Tu sors souvent par ici ?", english: "You go out around here often?", meaning: "Scene check" },
            { french: "Tu connais du monde ici ?", english: "You know people here?", meaning: "Social radar" },
            { french: "Je t'ai repéré", english: "I noticed you", meaning: "Confident observation" },
            { french: "Tentant", english: "Tempting", meaning: "One word. Loaded" },
            { french: "Peut-être", english: "Maybe", meaning: "Mystery tease" },
            { french: "Pourquoi pas", english: "Why not", meaning: "Open. Casual. Slightly teasing" },
            { french: "Comme tu veux", english: "As you wish", meaning: "Detached. Playful. Dangerous" },
            { french: "J'écoute", english: "I'm listening", meaning: "Intellectual foreplay" },
            { french: "Là, j'avoue…", english: "Okay, I admit…", meaning: "Soft tension" },
            { french: "Ça me plaît", english: "I like that", meaning: "Warm signal" },
            { french: "Ton Insta ?", english: "Your Instagram?", meaning: "Modern contact move" },
            { french: "On se capte ?", english: "Shall we meet up?", meaning: "Casual continuation" },
            { french: "On continue ailleurs ?", english: "Shall we continue elsewhere?", meaning: "Smooth escalation" },
            { french: "On se revoit quand ?", english: "When do I see you again?", meaning: "To be continued" }
        ];
        let currentCard = 0;
        const flashcard = document.getElementById('flashcard');
        const frenchText = document.getElementById('french-text');
        const englishText = document.getElementById('english-text');
        const meaningText = document.getElementById('meaning-text');
        const audioBtn = document.getElementById('audio-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const currentSpan = document.getElementById('current');
        document.getElementById('total').textContent = cards.length;
        function updateCard() {
            const card = cards[currentCard];
            frenchText.textContent = card.french;
            englishText.textContent = card.english;
            meaningText.textContent = card.meaning;
            currentSpan.textContent = currentCard + 1;
            flashcard.classList.remove('flipped');
            prevBtn.disabled = currentCard === 0;
            nextBtn.disabled = currentCard === cards.length - 1;
        }
        flashcard.addEventListener('click', () => flashcard.classList.toggle('flipped'));
        audioBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const utterance = new SpeechSynthesisUtterance(cards[currentCard].french);
            utterance.lang = 'fr-FR';
            utterance.rate = 0.85;
            const voices = speechSynthesis.getVoices();
            const frenchVoice = voices.find(v => v.lang.startsWith('fr') && v.name.toLowerCase().includes('female')) || voices.find(v => v.lang.startsWith('fr'));
            if (frenchVoice) utterance.voice = frenchVoice;
            speechSynthesis.speak(utterance);
        });
        if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
        prevBtn.addEventListener('click', () => { if (currentCard > 0) { currentCard--; updateCard(); } });
        nextBtn.addEventListener('click', () => { if (currentCard < cards.length - 1) { currentCard++; updateCard(); } });
        updateCard();
    </script>
</body>
</html>
