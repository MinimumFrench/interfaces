<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimum French, Maximum Romance</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
.header { width: 100%; padding: 24px 24px 16px; text-align: center; border-bottom: 1px solid #222; }
.title { font-size: 14px; font-weight: 400; letter-spacing: 2px; text-transform: uppercase; color: #fff; margin-bottom: 12px; }
.tabs { display: flex; justify-content: center; gap: 40px; }
.tab-btn { background: transparent; color: #666; border: none; padding: 8px 0 12px 0; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: inherit; font-weight: 400; transition: color 0.2s, border-bottom 0.2s; border-bottom: 1px solid transparent; }
.tab-btn:hover { color: #fff; }
.tab-btn.active { color: #fff; border-bottom: 1px solid #fff; }
.container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 32px 24px; width: 100%; }
.card-wrapper { width: 100%; max-width: 380px; perspective: 1200px; }
.card { width: 100%; height: 590px; position: relative; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
.card.flipped { transform: rotateY(180deg); }
.card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border: 1px solid #333; display: flex; flex-direction: column; justify-content: space-between; padding: 36px 28px; background: #000; }
.card-back { transform: rotateY(180deg); }
.card-content { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding-bottom: 20px; }
.french-text { font-size: 26px; font-weight: 400; line-height: 1.3; letter-spacing: 0.02em; margin-bottom: 32px; color: #fff; }
.audio-btn { background: transparent; color: #fff; border: 1px solid #fff; padding: 8px 24px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: inherit; font-weight: 400; -webkit-appearance: none; appearance: none; transition: background 0.2s, color 0.2s; }
.audio-btn:hover { background: #fff; color: #000; }
.english-text { font-size: 26px; font-weight: 400; color: #fff; margin-bottom: 24px; line-height: 1.2; letter-spacing: 0.02em; }
.meaning-text { font-size: 13px; font-weight: 400; letter-spacing: 2px; text-transform: uppercase; color: #aaa; line-height: 1.6; max-width: 300px; }
.tap-hint { text-align: center; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #aaa; font-weight: 400; }
.navigation { width: 100%; max-width: 380px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px 40px; }
.nav-btn { background: transparent; border: 1px solid #555; padding: 9px 18px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: inherit; font-weight: 400; color: #999; -webkit-appearance: none; appearance: none; transition: background 0.2s, color 0.2s, border-color 0.2s; }
.nav-btn:hover { background: #fff; color: #000; border-color: #fff; }
.nav-btn:disabled { opacity: 1; cursor: default; color: #444; border-color: #333; }
.nav-btn:disabled:hover { background: transparent; color: #444; border-color: #333; }
.progress { font-size: 12px; letter-spacing: 1px; font-weight: 400; color: #999; }
</style>
</head>
<body>

<div class="header">
<div class="title">Minimum French, Maximum Romance</div>
<div class="tabs">
<button class="tab-btn active" onclick="switchTab('flirting')">Flirting</button>
<button class="tab-btn" onclick="switchTab('dining')">Dining</button>
</div>
</div>

<div class="container">
<div class="card-wrapper">
<div class="card" id="card" onclick="flipCard()">
<div class="card-face card-front">
<div class="card-content">
<div class="french-text" id="french">T'as un truc en plus</div>
<button class="audio-btn" onclick="speak(event)">Listen</button>
</div>
<div class="tap-hint">tap to flip</div>
</div>
<div class="card-face card-back">
<div class="card-content">
<div class="english-text" id="english">You have something extra</div>
<div class="meaning-text" id="meaning">The compliment that lands</div>
</div>
<div class="tap-hint">tap to flip back</div>
</div>
</div>
</div>
</div>

<div class="navigation">
<button class="nav-btn" id="prev" onclick="prev()">← Prev</button>
<span class="progress"><span id="current">1</span> / <span id="total">2</span></span>
<button class="nav-btn" id="next" onclick="next()">Next →</button>
</div>

<script>
const flirting = [
  { french: "T'as un truc en plus", english: "You have something extra", meaning: "The compliment that lands" },
  { french: "T'es mon style", english: "You're my type", meaning: "Direct hit" }
];

const dining = [
  { french: "Une table pour deux", english: "Table for two", meaning: "Entry line" },
  { french: "L'addition, s'il vous plaît", english: "Check, please", meaning: "Exit move" }
];

let currentTab = 'flirting';
let currentIndex = 0;

function switchTab(tab) {
  currentTab = tab;
  currentIndex = 0;
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  updateCard();
}

function updateCard() {
  const cards = currentTab === 'flirting' ? flirting : dining;
  const card = cards[currentIndex];
  document.getElementById('french').textContent = card.french;
  document.getElementById('english').textContent = card.english;
  document.getElementById('meaning').textContent = card.meaning;
  document.getElementById('current').textContent = currentIndex + 1;
  document.getElementById('total').textContent = cards.length;
  document.getElementById('card').style.transform = 'rotateY(0deg)';
  document.getElementById('prev').disabled = currentIndex === 0;
  document.getElementById('next').disabled = currentIndex === cards.length - 1;
}

function flipCard() {
  const card = document.getElementById('card');
  card.style.transform = card.style.transform === 'rotateY(180deg)' ? 'rotateY(0deg)' : 'rotateY(180deg)';
}

function prev() {
  if (currentIndex > 0) {
    currentIndex--;
    updateCard();
  }
}

function next() {
  const cards = currentTab === 'flirting' ? flirting : dining;
  if (currentIndex < cards.length - 1) {
    currentIndex++;
    updateCard();
  }
}

function speak(e) {
  e.stopPropagation();
  const cards = currentTab === 'flirting' ? flirting : dining;
  const text = cards[currentIndex].french;
  
  speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'fr-FR';
  utterance.rate = 0.88;
  utterance.pitch = 1.05;
  
  const voices = speechSynthesis.getVoices();
  let selectedVoice = voices.find(v =>
    v.lang.startsWith('fr') &&
    (v.name.includes('Amélie') || v.name.includes('Alice') ||
     v.name.includes('Margot') || v.name.includes('Sophie') ||
     v.name.includes('Camille') || v.name.toLowerCase().includes('female'))
  );
  
  if (!selectedVoice) {
    selectedVoice = voices.find(v => v.lang.startsWith('fr'));
  }
  
  if (selectedVoice) utterance.voice = selectedVoice;
  speechSynthesis.speak(utterance);
}

if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

updateCard();
</script>

</body>
</html>
