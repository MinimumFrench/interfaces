<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimum French — Shop</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
.header { padding: 40px 24px 20px; text-align: center; border-bottom: 1px solid #222; }
.header-title { font-size: 20px; letter-spacing: 3px; text-transform: uppercase; font-weight: 400; }
.product-section { padding: 60px 24px; border-bottom: 1px solid #222; max-width: 100%; }
.section-inner { max-width: 600px; margin: 0 auto; }
.product-title { font-size: 20px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; font-weight: 400; line-height: 1.4; text-align: center; }
.product-desc { font-size: 14px; color: #aaa; margin-bottom: 40px; line-height: 1.6; }
.preview-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 40px; }
.tabs-container { display: flex; gap: 16px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
.tab-btn { background: transparent; color: #666; border: none; padding: 8px 0; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border-bottom: 1px solid transparent; transition: all 0.2s; }
.tab-btn.active { color: #fff; border-bottom: 1px solid #fff; }
.card-wrapper { width: 100%; max-width: 450px; perspective: 1200px; }
.card { width: 100%; height: 540px; position: relative; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
.card.flipped { transform: rotateY(180deg); }
.card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border: 1px solid #333; display: flex; flex-direction: column; justify-content: space-between; padding: 36px 28px; background: #000; }
.card-back { transform: rotateY(180deg); }
.card-content { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding-bottom: 20px; }
.french-text { font-size: 20px; font-weight: 400; line-height: 1.3; margin-bottom: 24px; }
.audio-btn { background: transparent; color: #fff; border: 1px solid #fff; padding: 8px 20px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: inherit; transition: background 0.2s, color 0.2s; }
.audio-btn:hover { background: #fff; color: #000; }
.english-text { font-size: 20px; font-weight: 400; color: #fff; margin-bottom: 20px; }
.meaning-text { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: #aaa; }
.tap-hint { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: #fff; text-align: center; }
.nav-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; width: 100%; max-width: 450px; }
.nav-btn { background: transparent; border: 1px solid #555; padding: 8px 16px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; color: #999; transition: all 0.2s; }
.nav-btn:hover { background: #fff; color: #000; border-color: #fff; }
.nav-btn:disabled { color: #444; border-color: #333; cursor: default; }
.progress { font-size: 12px; color: #999; }
.cta-buttons { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 24px; }
.btn { padding: 12px 32px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: inherit; text-decoration: none; display: inline-block; transition: all 0.2s; }
.btn-buy { background: #fff; color: #000; border: 1px solid #fff; font-weight: 500; }
.btn-buy:hover { opacity: 0.9; }
.footer { padding: 40px 24px; text-align: center; }
.footer a { font-size: 16px; color: #fff; margin: 0 24px; transition: color 0.2s; text-decoration: none; display: inline-block; letter-spacing: 1px; }
.footer a:hover { color: #aaa; }
</style>
</head>

<div class="header">
<div class="header-title">Minimum French Maximum Parisian</div>
