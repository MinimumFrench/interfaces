<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flirt & Date Preview</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
.header { width: 100%; padding: 20px 24px 16px; text-align: center; border-bottom: 1px solid #222; }
.title { font-size: 15px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: #fff; margin-bottom: 16px; }
.tabs { display: flex; justify-content: center; gap: 40px; }
.tab-btn { background: transparent; color: #666; border: none; padding: 8px 0 12px 0; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: inherit; font-weight: 400; transition: color 0.2s, border-bottom 0.2s; border-bottom: 1px solid transparent; }
.tab-btn:hover { color: #fff; }
.tab-btn.active { color: #fff; border-bottom: 1px solid #fff; }
.container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px 24px; width: 100%; }
.card-wrapper { width: 100%; max-width: 380px; perspective: 1200px; }
.card { width: 100%; height: 540px; position: relative; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
.card.flipped { transform: rotateY(180deg); }
.card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border: 1px solid #333; display: flex; flex-direction: column; justify-content: space-between; padding: 36px 28px; background: #000; }
.card-back { transform: rotateY(180deg); }
.card-content { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding-bottom: 20px; }
.french-text { font-size: 24px; font-weight: 400; line-height: 1.3; letter-spacing: 0.02em; margin-bottom: 32px; color: #fff; }
.audio-btn { background: transparent; color: #fff; border: 1px solid #fff; padding: 8px 24px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: inherit; font-weight: 400; -webkit-appearance: none; appearance: none; transition: background 0.2s, color 0.2s; }
.audio-btn:hover { background: #fff; color: #000; }
.english-text { font-size: 24px; font-weight: 400; color: #fff; margin-bottom: 24px; line-height: 1.2; letter-spacing: 0.02em; }
.meaning-text { font-size: 13px; font-weight: 400; letter-spacing: 2px; text-transform: uppercase; color: #aaa; line-height: 1.6; max-width: 300px; }
.tap-hint { text-align: center; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #aaa; font-weight: 400; }
.navigation { width: 100%; max-width: 380px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px 40px; }
.nav-btn { background: transparent; border: 1px solid #555; padding: 9px 18px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: inherit; font-weight: 400; color: #999; -webkit-appearance: none; appearance: none; transition: background 0.2s, color 0.2s, border-color 0.2s; }
.nav-btn:hover { background: #fff; color: #000; border-color: #fff; }
.nav-btn:disabled { opacity: 1; cursor: default; color: #444; border-color: #333; }
.nav-btn:disabled:hover { background: transparent; color: #444; border-color: #333; }
.progress { font-size: 12px; letter-spacing: 1px; font-weight: 400; color: #999; }
</style>
</head>
<body>
<div class="header">
<div class="title">Minimum French, Maximum Romance</div>
<div class="tabs">
<button class="tab-btn active" data-tab="flirting">Flirting</button>
<button class="tab-btn" data-tab="dating">Dating</button>
</div>
</div>

<div class="container">
<div class="card-wrapper">
<div class="card" id="flashcard">
<div class="card-face card-front">
<div class="card-content">
<div class="french-text" id="french-text">Enchanté</div>
<button class="audio-btn" id="audio-btn">Listen</button>
</div>
<div class="tap-hint">tap to flip</div>
</div>
<div class="card-face card-back">
<div class="card-content">
<div class="english-text" id="english-text">Nice to meet you</div>
<div class="meaning-text" id="meaning-text">Simple. Smooth. French</div>
</div>
<div class="tap-hint">tap to flip back</div>
</div>
</div>
</div>
</div>

<div class="navigation">
<button class="nav-btn" id="prev-btn">&#8592; Prev</button>
<div class="progress"><span id="current">1</span> / <span id="total">2</span></div>
<button class="nav-btn" id="next-btn">Next &#8594;</button>
</div>

<script>
const flirtingCards = [
  { french: "Enchanté", english: "Nice to meet you", meaning: "Simple. Smooth. French" },
  { french: "T'es mon style", english: "You're my type", meaning: "Direct hit" }
];

const datingCards = [
  { french: "Tu me plais bien", english: "I like you", meaning: "Soft but clear" },
  { french: "On se revoit ?", english: "See you again?", meaning: "Round two" }
];

let currentTab = 'flirting';
let currentCard = 0;
const card = document.getElementById('flashcard');
const frenchText = document.getElementById('french-text');
const englishText = document.getElementById('english-text');
const meaningText = document.getElementById('meaning-text');
const listenBtn = document.getElementById('audio-btn');
const tabFlirt = document.querySelectorAll('.tab-btn')[0];
const tabDate = document.querySelectorAll('.tab-btn')[1];
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');

function getCards() {
  return currentTab === 'flirting' ? flirtingCards : datingCards;
}

function updateCard() {
  const cards = getCards();
  const c = cards[currentCard];
  frenchText.textContent = c.french;
  englishText.textContent = c.english;
  meaningText.textContent = c.meaning;
  document.getElementById('current').textContent = currentCard + 1;
  card.style.transform = 'rotateY(0deg)';
  prevBtn.disabled = currentCard === 0;
  nextBtn.disabled = currentCard === cards.length - 1;
}

function flipCard() {
  card.style.transform = card.style.transform === 'rotateY(180deg)' ? 'rotateY(0deg)' : 'rotateY(180deg)';
}

function speakFrench() {
  const cards = getCards();
  const utterance = new SpeechSynthesisUtterance(cards[currentCard].french);
  utterance.lang = 'fr-FR';
  utterance.rate = 0.85;
  const voices = speechSynthesis.getVoices();
  const frenchVoice = voices.find(v => v.lang.startsWith('fr') && v.name.toLowerCase().includes('female')) || voices.find(v => v.lang.startsWith('fr'));
  if (frenchVoice) utterance.voice = frenchVoice;
  speechSynthesis.speak(utterance);
}

card.addEventListener('click', flipCard);
listenBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  speakFrench();
});

function switchTab(tab) {
  currentTab = tab;
  currentCard = 0;
  updateCard();
  tabFlirt.style.color = tab === 'flirting' ? '#fff' : '#666';
  tabFlirt.style.borderBottom = tab === 'flirting' ? '1px solid #fff' : '1px solid transparent';
  tabDate.style.color = tab === 'dating' ? '#fff' : '#666';
  tabDate.style.borderBottom = tab === 'dating' ? '1px solid #fff' : '1px solid transparent';
}

tabFlirt.addEventListener('click', () => switchTab('flirting'));
tabDate.addEventListener('click', () => switchTab('dating'));

prevBtn.addEventListener('click', () => {
  if (currentCard > 0) {
    currentCard--;
    updateCard();
  }
});

nextBtn.addEventListener('click', () => {
  const cards = getCards();
  if (currentCard < cards.length - 1) {
    currentCard++;
    updateCard();
  }
});

if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

updateCard();
</script>

</body>
</html>
